services:
  # ── Full-stack service (FastAPI serves built React frontend) ───────────────
  - type: web
    name: electrodesign2pro
    runtime: python
    buildCommand: >
      cd frontend && yarn install && yarn build && cd .. &&
      cp -r frontend/build backend/static &&
      pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
    healthCheckPath: /api/health
